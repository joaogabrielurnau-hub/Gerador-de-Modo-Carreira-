body{

  background-image: url("Fundos/Estadio.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

}

    text-align: center;
    color: white;
    text-shadow: 0 0 15px black;
}

.bloco{
    margin-bottom: 20px;

    background: rgba(255,255,255,0.85);
    padding: 18px;
    border-radius: 15px;

    backdrop-filter: blur(5px);
}

button{
    padding: 10px 20px;
    cursor: pointer;

    background: #00b050;
    color: white;
    border: none;
    border-radius: 10px;

    font-weight: bold;
}

button:hover{
    transform: scale(1.03);
}

#resultado{
    margin-top: 30px;

    background: rgba(255,255,255,0.85);

    padding: 15px;
    border-radius: 15px;

    backdrop-filter: blur(5px);
}

.barraCheia,
.barraVazia{
    display: inline-block;
    width: 12px;
    height: 12px;
    margin-right: 4px;
    border-radius: 3px;
}

.barraCheia{
    background: #00d26a;
}

.barraVazia{
    background: #555;
}

.bandeira{
    width:30px;
    height:auto;
    vertical-align:middle;
    margin-right:8px;
}

<div class="bloco">

</div>

const clubesCompativeis = clubes.map(clube => {

        score += 4;
    }

    // Mercado
    let matches = 0;

    mercadosSelecionados.forEach(m => {
        if (clube.mercado.includes(m)) {
            matches++;
            score += 2;
        }
    });

    if (
        matches === mercadosSelecionados.length &&
        matches > 1
    ) {
        score += 2;
    }

    // Desafio
    const diff = Math.abs(clube.desafio - dificuldade);
    score += Math.max(0, 3 - diff);

    // Crescimento
    if (clube.crescimento === crescimento) {
        score += 3;
    }

    return { ...clube, score };

});
